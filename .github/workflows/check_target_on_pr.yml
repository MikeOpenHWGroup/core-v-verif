name: check_target

on:
  pull_request:
    types: [opened, reopened, edited]

jobs:
  check_target:
    runs-on: ubuntu-latest
    steps:
      - if: ${{ (github.event.pull_request.head.ref == 'aws_ci_migration' && github.event.pull_request.base.ref == 'master') || github.event.pull_request.base.ref == 'aws_ci_migration' }}
        run: exit 0
      - if: ${{ github.event.pull_request.base.ref != 'aws_ci_migration' }}
        run: exit 1
